<!DOCTYPE html>
<html>
<head>
  <title>My Orders</title>
  <link rel="stylesheet" href="../css/orders.css">
  <script src="../js/orders.js" defer></script>
</head>
<body>

  <!-- NAV -->
<nav class="nav">

  <!-- LEFT -->
<div class="back-btn" onclick="goBack()">
  <span class="arrow"></span>
</div>

  <!-- RIGHT -->
  <div class="user-menu">

    <!-- USER ICON -->
    <div class="user-icon" id="userIcon">👤</div>

    <!-- DROPDOWN -->
    <div class="dropdown" id="dropdown">

      <div class="dropdown-header">
        <div class="avatar">👤</div>
        <p id="userEmail"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="640109050d08240309050d084a070b09">[email&#160;protected]</a></p>
      </div>

      <hr>

      <div class="dropdown-item" onclick="showView('profileView')">Profile</div>
      <div class="dropdown-item" onclick="showView('settingsView')">Settings</div>
      <div class="dropdown-item logout" onclick="logout()">Sign out</div>

    </div> <!-- ✅ CLOSE DROPDOWN -->

  </div> <!-- ✅ CLOSE USER MENU -->

</nav> <!-- ✅ CLOSE NAV -->

<!-- TABS -->
<div class="tabs">
  <span id="ordersTab" class="active" onclick="showView('ordersView')">Orders</span>
  <span id="profileTab" onclick="showView('profileView')">Profile</span>
</div>

<!-- 🔥 ORDERS VIEW -->
<div id="ordersView" class="view active">
  <div class="orders-container">


  <div id="orders-list" class="empty-box">
    <h3>No orders yet</h3>
    <p>Go to store to place an order.</p>
  </div>


  </div>
</div>

<!-- 🔥 PROFILE VIEW -->
<div id="profileView" class="view">
  <div class="profile-container">

    <!-- LEFT SIDE -->
    <div class="profile-left">

      <div class="summary">
        <h3>Profile</h3>

        <p class="label">Name</p>
        <p id="fullName">Your Name ✏️</p>

        <p class="label">Email</p>
        <p id="emailText"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="16737b777f7a56717b777f7a3875797b">[email&#160;protected]</a></p>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="profile-right">

      <div class="summary">
        <div class="address-header">
          <h3>Addresses</h3>
          <span class="add">+ Add</span>
        </div>

        <div class="no-address">
          No addresses added
        </div>
      </div>

    </div>

  </div>
</div>

  <!-- SETTINGS VIEW -->
  <div id="settingsView" class="view">
    <div class="summary">
      <h3>Sign out everywhere</h3>

      <p class="desc">
        I
