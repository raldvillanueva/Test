<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link rel="stylesheet" href="../css/cart.css">
  <script src="../js/cart.js" defer></script>
</head>
<body>

<!-- ✅ BACK NAV (FIXED) -->
<nav class="nav">
  <div class="back-wrap">
    <h1 id="homepage"onclick="gotoHomePage()">SugarLoomPh</h1>
  </div>
</nav>

<!-- NAV CENTER -->
<div class="cart-container">
  <div class="items" id="cart-items"></div>

  <div class="summary">
    <h3>Order Summary</h3>
    <p>Subtotal: ₱<span id="subtotal">0</span></p>
    <p>Delivery: ₱<span id="delivery">0</span></p>
    <h2>Total: ₱<span id="total">0</span></h2>
    <button id="checkoutBtn" onclick="checkout()">Checkout</button>
  </div>

  <div id="msg" class="msg"></div>

</div>

<div id="loginToast" class="toast">
  <p>You need to login first 🔐</p>
  <button onclick="goToLogin()">Login Now</button>
</div>

</body>
</html>
